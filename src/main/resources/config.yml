# Configuration Farmland
# ⚠ Ne JAMAIS mettre de vraies URL de webhook ici, ce fichier est dans le repo Git public !
# Remplis les vraies valeurs dans plugins/Farmland/config.yml sur ton serveur, pas ici.

discord:
  webhook-status: ""
  webhook-message: ""
  webhook-moderation: ""

# WebAPI vers farm-land.fr
# Remplis base_url et api_key dans plugins/Farmland/config.yml sur ton serveur
webapi:
  enabled: false
  base_url: ""
  api_key: ""
  # intervalle du push statut serveur (joueurs en ligne / max / version)
  push_interval_seconds: 30
  # intervalle du push leaderboard (argent, structures, blocs posés)
  leaderboard_push_minutes: 15

# Monde du hub (commande /hub)
hub:
  world: "world"

# Sites de vote affichés par /vote (récompense gérée par NuVotifier)
vote:
  sites:
    - "https://serveur-prive.net/minecraft/farmland"
    - "https://top-serveurs.net/minecraft/farmland"
